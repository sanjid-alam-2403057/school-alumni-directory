<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Alumni Directory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Our School Alumni</h1>
        <p>Connecting past students with the future.</p>
        
        <a href="https://forms.gle/KCkgUvTfByeTB7856" target="_blank" class="join-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" class="join-icon">

            </svg>
            Add Profile
        </a>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by name, university, or batch...">
        </div>

        <div class="sort-container">
            <button id="sortName" class="sort-btn">Sort A-Z</button>
            <button id="sortBatch" class="sort-btn">Newest Batch</button>
        </div>
    </header>

    <main id="alumni-container">
        </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Our School Alumni. All rights reserved.</p>
           <p>Developed by Sanjid Alam<br>
               Department of CSE, RUET</p>

    <script src="app.js"></script>
