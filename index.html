<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Alumni Directory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Our School Alumni</h1>
        <p>Connecting past students with the future.</p>
        
        <a href="YOUR_GOOGLE_FORM_LINK" target="_blank" class="join-btn">Add Your Profile</a>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by name, university, or batch...">
        </div>

        <div class="sort-container">
            <button id="sortName" class="sort-btn">Sort A-Z</button>
            <button id="sortBatch" class="sort-btn">Newest Batch</button>
        </div>
    </header>

    <main id="alumni-container">
        </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Our School Alumni. All rights reserved.</p>
           <p>Developed by Sanjid Alam</p>
<p>Department of CSE, RUET</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
